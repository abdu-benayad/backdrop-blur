name: CI

# Verification tiers, as they exist today:
#   - default tier   — runs on ANY runner, spins up zero GPU contexts (the repo invariant
#                      that the default `cargo test` builds and runs GPU or not), plus the
#                      wgpu-free grab-pass (kiosk) config and the MSRV build.
#   - gated GPU tier — lavapipe software Vulkan (`image-snapshots`): the wgpu backend's
#                      readback/snapshot tests and the egui own-loop render test.
#   - gated GL tier  — EGL-surfaceless software GL (`gl-snapshots`): the glow backend's
#                      Tier-1 readback tests AND the egui adapter's GL control-flow tests.
#   - wasm build     — the library crates compiled for wasm32 (build only): glow for WebGL2
#                      readiness, plus the wgpu / own-loop -egui path (E1 error-boxing portability).
#   - excluded examples — built (not run) in their own job; they never enter the portable
#                      `--workspace --all-targets` loop, which is why that loop stays
#                      winit-free and portable.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  default-tier:
    name: default tier (any runner, GPU-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: format
        run: cargo fmt --all -- --check
      - name: clippy (libraries + their tests; no library pulls winit)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test (core unit tests + egui fake-backend wiring test)
        run: cargo test --workspace
      - name: build
        run: cargo build --workspace

  grab-pass:
    # The kiosk (grab-pass) feature config is NOT covered by default-tier (which is own-loop
    # default). Without this job a neutral-spine regression that breaks the grab-pass build, or a
    # feature-unification leak that re-adds wgpu, would land green on `main` (no PR diff to catch
    # it). Pulled forward from IMPL Step 3c so the kiosk surface is guarded throughout. GPU-free
    # and winit-free, so it needs no extra system deps.
    name: grab-pass (kiosk) build — wgpu-free
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: build + clippy + test the grab-pass configuration
        run: |
          cargo build -p backdrop-blur-egui --no-default-features --features grab-pass
          cargo clippy -p backdrop-blur-egui --no-default-features --features grab-pass -- -D warnings
          # The callback_region orientation tests are pure (no GL), so they run on any runner.
          cargo test -p backdrop-blur-egui --no-default-features --features grab-pass
      - name: assert the kiosk build pulls no wgpu (feature-unification guard)
        run: |
          # `cargo tree -i wgpu` exits 0 if wgpu is reachable, non-zero ("did not match") if not.
          if cargo tree -p backdrop-blur-egui --no-default-features --features grab-pass -e normal -i wgpu 2>/dev/null; then
            echo "::error::wgpu is reachable from the grab-pass (kiosk) build — feature-unification leak"
            exit 1
          else
            echo "OK: wgpu is absent from the grab-pass dependency tree"
          fi

  msrv:
    name: MSRV 1.92 builds
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.92.0" # override rust-toolchain.toml's dev-pin for this job
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: build on the declared MSRV
        run: cargo build --workspace
      - name: check the gated configs on the declared MSRV
        # The gated (gl-snapshots / image-snapshots) code is compiled only in the GPU/GL jobs,
        # which run the dev toolchain — gated code could otherwise adopt a >MSRV API unseen.
        # `cargo check` type-checks the gated code without needing a GPU.
        run: |
          cargo check -p backdrop-blur-glow --all-targets --features gl-snapshots
          cargo check -p backdrop-blur-egui --all-targets --features gl-snapshots
          cargo check -p backdrop-blur-wgpu --all-targets --features image-snapshots

  gpu:
    name: gated GPU tier (lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install lavapipe (software Vulkan rasterizer)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers
      - name: clippy (gated image-snapshots configs)
        # default-tier's workspace clippy never enables these features, so lint rot behind the
        # gate is invisible there. Clippy type-checks without executing — no GPU needed.
        run: |
          cargo clippy -p backdrop-blur-wgpu --all-targets --features image-snapshots -- -D warnings
          cargo clippy -p backdrop-blur-egui --all-targets --features image-snapshots -- -D warnings
      - name: gated GPU readback + snapshot tests
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
          WGPU_BACKEND: vulkan
        # --test-threads=1: lavapipe is not reliably parallel-safe (LESSONS).
        run: |
          cargo test -p backdrop-blur-wgpu --features image-snapshots -- --test-threads=1
          cargo test -p backdrop-blur-egui --features image-snapshots -- --test-threads=1

  gl-native:
    # The glow backend's Tier-1 readback tests (grab / blur / composite) AND the egui adapter's
    # GrabPassRenderer control-flow tests, both on a real GL context. The EGL-surfaceless harness
    # (shared: glow's doc-hidden `gl_harness` module) tries the NVIDIA device-platform path, then
    # the default display; on a headless Mesa runner `EGL_PLATFORM=surfaceless` + software GL
    # resolves to llvmpipe. All GL GPU tests are `gl-snapshots`-gated, so they run only here,
    # never in the default tier.
    name: gated GL tier (glow + egui adapter, EGL-surfaceless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install Mesa software GL + EGL
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dri libgles2-mesa-dev
      - name: clippy (gated gl-snapshots configs)
        # Same coverage gap as the gpu job: gl-snapshots test code is unlinted elsewhere.
        # --no-default-features on the egui config: the own-loop default would otherwise pull
        # the whole wgpu stack onto the GL runner for tests that never touch it.
        run: |
          cargo clippy -p backdrop-blur-glow --all-targets --features gl-snapshots -- -D warnings
          cargo clippy -p backdrop-blur-egui --no-default-features --features gl-snapshots --all-targets -- -D warnings
      - name: gated GL readback tests (grab / blur / composite)
        env:
          EGL_PLATFORM: surfaceless
          LIBGL_ALWAYS_SOFTWARE: "1"
        # --test-threads=1: each test makes its own EGL context; parallel contexts exhaust the
        # surfaceless display.
        run: cargo test -p backdrop-blur-glow --features gl-snapshots -- --test-threads=1
      - name: gated GL control-flow tests (egui GrabPassRenderer)
        env:
          EGL_PLATFORM: surfaceless
          LIBGL_ALWAYS_SOFTWARE: "1"
        # --test-threads=1: each test makes its own EGL context; parallel contexts exhaust the
        # surfaceless display. --no-default-features: see the clippy step above.
        run: cargo test -p backdrop-blur-egui --no-default-features --features gl-snapshots -- --test-threads=1

  wasm:
    # The library crates must stay buildable for wasm32 (compile-only), and the browser fault
    # probe must keep compiling against them. glow is the design's web-first WebGL2 target; the
    # wgpu backend + own-loop -egui adapter are guarded here so E1's error-boxing portability
    # (BackendError's Send+Sync bound vs wgpu::Error on wasm) can't regress uncaught. The
    # webgpu-fault-probe example is the executed browser verification of the deferred fault path
    # (a documented local procedure — behavioral wasm verification stays out of CI); this job
    # only guards its compile. The headless-Chromium WebGL2 readback tier is a separate
    # (deferred) job.
    name: wasm32 build (library + probe compile portability)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: build the glow backend for wasm32 (the WebGL2 target)
        run: cargo build -p backdrop-blur-glow --target wasm32-unknown-unknown
      - name: build the wgpu backend for wasm32 (own-loop compile-portability)
        run: cargo build -p backdrop-blur-wgpu --target wasm32-unknown-unknown
      - name: build the egui own-loop adapter for wasm32
        run: cargo build -p backdrop-blur-egui --target wasm32-unknown-unknown
      - name: build the browser fault probe (executed locally; compile-guarded here)
        run: cargo build --manifest-path examples/webgpu-fault-probe/Cargo.toml --target wasm32-unknown-unknown

  examples:
    name: excluded examples (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: winit build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev
      - name: winit own-loop example
        run: |
          cargo clippy --manifest-path examples/egui-wgpu-panel/Cargo.toml -- -D warnings
          cargo build --manifest-path examples/egui-wgpu-panel/Cargo.toml
      - name: headless frost gallery (own-loop, depends on the egui adapter API)
        run: |
          cargo clippy --manifest-path examples/frost-gallery/Cargo.toml -- -D warnings
          cargo build --manifest-path examples/frost-gallery/Cargo.toml
      - name: eframe-on-glow grab-pass preview (depends on the grab-pass adapter API)
        run: |
          cargo clippy --manifest-path examples/eframe-glow-panel/Cargo.toml -- -D warnings
          cargo build --manifest-path examples/eframe-glow-panel/Cargo.toml
